version: 2
updates:
  # Event Publisher (pip / requirements.txt)
  - package-ecosystem: "pip"
    directory: "/deployment/eventPublisher"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # NiFi scripts (Poetry / pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/deployment/nifi/nifi-scripts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # GitHub Actions workflows (for when CI is added)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Website (npm / React + Vite) — grouped to one weekly PR to limit noise
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      website-deps:
        patterns:
          - "*"
